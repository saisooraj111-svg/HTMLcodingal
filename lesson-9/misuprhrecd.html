<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mi super hero cd</title>
    <style>
        body {
            background-color: rgb(0, 137, 139);
            color: white;
            font-family: Arial, sans-serif;
        }
        .hero-name {
            font-size: 60px;
            font-weight: bold;
            color: yellow;
            text-shadow: 3px 3px rgb(255, 115, 0);
        }
        .tagline {
            font-size: 30px;
            font-style: italic;
            text-transform: capitalize;
        }
        .label {
            text-transform: uppercase;
            text-decoration: underline;
            color: rgb(220, 220, 20);
        }
        .power {
            font-weight: bold;
            color: rgb(28, 11, 184);
        }
        .weakness {
            text-decoration: underline;
            color: rgb(255, 80, 80);
        }
        .badge {
            background-color: rgb(229, 255, 0);
            color: black;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }
        .made-by {
            font-size: 14px;
            font-style: italic;
            color: lightgray;
        }

    </style>
</head>
<body>
    <h1 class="hero-name">BBQ NAATION</h1>
    <p class="tagline">our menu</p>

    <h2 class="label">specials</h2>
    <p class="power">Chillie baby corn</p>
    <p class="power">Grilled chicken skewers</p>
    <p class="power">chickel lolipop</p>
    <p class="power">pork brisket</p>
    <p class="power">cooked pork</p>
    <p class="power">steak</p>

    <h2 class="label">specials</h2>
    <p class="weakness">brocoli salad</p>
    <p class="weakness">chilli chicken</p>
    <p class="weakness">freshly shellshocked crabs</p>

    <p class="badge">Top paper grill</p>
    <p class="made-by">Made by: me</p>
</body>
</html>
